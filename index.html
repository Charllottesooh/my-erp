
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>거래관리시스템 v4.0</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pri:#1a56db;--prl:#e8f0fe;--prd:#0f3a9a;
  --ok:#0d9f6e;--okl:#e6f9f1;
  --err:#e02424;--erl:#fde8e8;
  --wrn:#c27803;--wrl:#fdf6e3;
  --sid:#0f172a;--si2:#1e293b;
  --bg:#f8fafc;--ca:#fff;--bd:#e2e8f0;
  --tx:#1e293b;--mu:#64748b;--lt:#94a3b8;
  --r:8px;--r2:12px
}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;min-height:100vh}
#login-screen{display:none}
.lbox{background:#fff;border-radius:20px;padding:40px;width:340px}
.llg{text-align:center;margin-bottom:26px}
.llg h1{font-size:18px;font-weight:900;color:#0f172a;margin-bottom:3px}
.llg span{font-size:11px;color:var(--mu)}
.lerr{background:var(--erl);color:#991b1b;border:1px solid #fca5a5;border-radius:var(--r);padding:9px 13px;font-size:12px;margin-bottom:12px;display:none}
.app{display:flex;min-height:100vh}
.sidebar{width:218px;background:var(--sid);flex-shrink:0;display:flex;flex-direction:column}
.slogo{padding:15px 16px;border-bottom:1px solid #1e293b}
.slogo h1{color:#fff;font-size:13px;font-weight:800}
.slogo span{color:#60a5fa;font-size:10px;display:block;margin-top:2px}
.snav{flex:1;padding:8px 0;overflow-y:auto}
.nsec{padding:9px 16px 3px;font-size:10px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.7px}
.ni{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;color:var(--lt);font-size:12px;transition:all .15s;border-left:3px solid transparent}
.ni:hover{background:var(--si2);color:#e2e8f0}
.ni.active{background:var(--si2);color:#fff;border-left-color:#3b82f6}
.nico{width:14px;text-align:center;font-size:13px}
.sbot{padding:12px 16px;border-top:1px solid #1e293b}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--ca);border-bottom:1px solid var(--bd);padding:0 18px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tbtl{font-size:14px;font-weight:800}
.tba{display:flex;gap:5px;align-items:center}
.content{flex:1;overflow-y:auto;padding:18px}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 11px;border-radius:var(--r);font-size:12px;font-weight:700;cursor:pointer;border:1px solid transparent;transition:all .15s;white-space:nowrap;font-family:inherit}
.bp{background:var(--pri);color:#fff;border-color:var(--pri)}.bp:hover{background:var(--prd)}
.bs{background:var(--ca);color:var(--tx);border-color:var(--bd)}.bs:hover{background:var(--bg)}
.bok{background:var(--ok);color:#fff}.bok:hover{background:#065f46}
.ber{background:var(--err);color:#fff;font-size:11px;padding:4px 8px}
.bw{background:var(--wrn);color:#fff}
.bgh{background:none;border:1px solid var(--bd);color:var(--mu)}.bgh:hover{background:var(--bg)}
.card{background:var(--ca);border:1px solid var(--bd);border-radius:var(--r2)}
.ch{padding:11px 15px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.ct{font-size:13px;font-weight:800}
.cb{padding:15px}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:15px}
.sc{background:var(--ca);border:1px solid var(--bd);border-radius:var(--r2);padding:12px 15px}
.sl{font-size:11px;color:var(--mu);margin-bottom:3px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.sv{font-size:18px;font-weight:800}
.sv.bl{color:var(--pri)}.sv.gn{color:var(--ok)}.sv.rd{color:var(--err)}.sv.og{color:var(--wrn)}
.sdiff{font-size:10px;color:var(--mu);margin-top:2px}
.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.4px}
.fi,.fs,.fta{border:1px solid var(--bd);border-radius:6px;padding:7px 10px;font-size:13px;color:var(--tx);background:var(--ca);width:100%;outline:none;font-family:inherit}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.fta{resize:vertical;min-height:60px}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{background:#f8fafc}
th{padding:8px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bd)}
td{padding:9px 10px;border-bottom:1px solid var(--bd);color:var(--tx);vertical-align:middle}
tbody tr:hover{background:#f8fafc}
tbody tr:last-child td{border-bottom:none}
.tr{text-align:right}.tc{text-align:center}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700}
.bbl{background:var(--prl);color:#0f3a9a}.bgn{background:var(--okl);color:#065f46}.brd{background:var(--erl);color:#991b1b}.bog{background:var(--wrl);color:#92400e}.bgy{background:#f1f5f9;color:var(--mu)}
.abl{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:var(--r);font-size:12px;font-weight:600;margin-bottom:6px;width:100%}
.a-rd{background:var(--erl);color:#991b1b;border:1px solid #fca5a5}
.a-og{background:var(--wrl);color:#92400e;border:1px solid #fcd34d}
.a-gn{background:var(--okl);color:#065f46;border:1px solid #6ee7b7}
.moverlay{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:28px 16px;overflow-y:auto}
.modal{background:var(--ca);border-radius:16px;width:100%}
.msm{max-width:430px}.mmd{max-width:600px}.mlg{max-width:820px}
.mh{padding:15px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--ca);z-index:1;border-radius:16px 16px 0 0}
.mt2{font-size:14px;font-weight:800}
.mb2{padding:20px}
.mf{padding:12px 20px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:6px}
.xbtn{background:none;border:none;cursor:pointer;font-size:20px;color:var(--mu);line-height:1;padding:2px;font-family:inherit}
.fbar{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:13px;background:var(--ca);border:1px solid var(--bd);border-radius:var(--r2);padding:9px 13px}
.fbar label{font-size:11px;font-weight:700;color:var(--mu);white-space:nowrap}
.fbar input[type=date],.fbar input[type=month]{border:1px solid var(--bd);border-radius:6px;padding:5px 8px;font-size:11px;color:var(--tx);background:var(--ca);outline:none;font-family:inherit}
.fbar input:focus{border-color:var(--pri)}
.qbtns{display:flex;gap:3px;flex-wrap:wrap}
.qbtn{padding:4px 8px;border:1px solid var(--bd);border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;background:var(--ca);color:var(--mu);transition:all .15s;font-family:inherit}
.qbtn:hover{background:var(--prl);color:var(--pri);border-color:var(--pri)}
.qbtn.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.itab{width:100%;border-collapse:collapse;font-size:12px;margin-top:5px}
.itab th{background:#f8fafc;padding:6px 7px;text-align:left;font-size:10px;font-weight:700;color:var(--mu);border:1px solid var(--bd)}
.itab td{padding:4px 5px;border:1px solid var(--bd)}
.itab input,.itab select{border:none;background:transparent;font-size:12px;width:100%;outline:none;padding:2px 3px;color:var(--tx);font-family:inherit}
.itab input:focus,.itab select:focus{background:var(--prl);border-radius:3px}
.itr-t{background:#f0f7ff;font-weight:700}
.tiv{border:2px solid #000;font-size:11px;color:#000;background:#fff;max-width:780px;margin:0 auto}
.tiv-ttl{text-align:center;font-size:17px;font-weight:900;padding:7px;border-bottom:1px solid #000;letter-spacing:2px}
.tiv-grid{display:grid;grid-template-columns:1fr 1fr}
.tiv-row{display:flex;border-bottom:1px solid #ccc;min-height:21px}
.tiv-row:last-child{border-bottom:none}
.tiv-k{background:#f5f5f5;padding:3px 6px;width:74px;flex-shrink:0;font-weight:700;display:flex;align-items:center;font-size:10px;border-right:1px solid #ccc}
.tiv-v{padding:3px 6px;flex:1;display:flex;align-items:center;font-size:10px}
.gs-s{display:flex;align-items:center;gap:8px;padding:9px 13px;border-radius:var(--r);font-size:12px;font-weight:700;margin-bottom:8px}
.gs-ok{background:var(--okl);color:#065f46;border:1px solid #6ee7b7}
.gs-er{background:var(--erl);color:#991b1b;border:1px solid #fca5a5}
.gs-wn{background:var(--wrl);color:#92400e;border:1px solid #fcd34d}
.sync-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
.tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:14px}
.tab{padding:8px 13px;cursor:pointer;font-size:12px;font-weight:700;color:var(--mu);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab:hover{color:var(--tx)}
.tab.active{color:var(--pri);border-bottom-color:var(--pri)}
.g2{display:grid;gap:11px}
.g22{grid-template-columns:1fr 1fr}
.g23{grid-template-columns:1fr 1fr 1fr}
.g24{grid-template-columns:1fr 1fr 1fr 1fr}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.flex{display:flex}.gap6{gap:6px}.gap8{gap:8px}.gap12{gap:12px}.aic{align-items:center}.jb{justify-content:space-between}.f1{flex:1}.fw{flex-wrap:wrap}
.bold{font-weight:700}.tmuted{color:var(--mu)}.tsm{font-size:11px}
.progress-bar{height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--pri);border-radius:3px;transition:width .3s}
/* 온라인 배지 */
.online-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:#e6f9f1;border:1px solid #6ee7b7;border-radius:20px;font-size:11px;font-weight:700;color:#065f46}
.online-dot{width:7px;height:7px;border-radius:50%;background:#0d9f6e;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@media(max-width:768px){.sidebar{width:50px}.slogo h1,.slogo span,.ni span,.nsec,.sbot span{display:none}.sgrid{grid-template-columns:repeat(2,1fr)}.g22,.g23,.g24{grid-template-columns:1fr}}
@media print{.sidebar,.topbar,.no-print,.fbar{display:none!important}.content{padding:0}body{background:#fff}}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen" style="display:none">
  <div class="lbox">
    <div class="llg">
      <div style="width:52px;height:52px;background:#0f172a;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:24px">📊</div>
      <h1>거래관리시스템</h1>
      <span>Trade Management ERP v4.0</span>
    </div>
    <div class="lerr" id="lerr">아이디 또는 비밀번호가 올바르지 않습니다.</div>
    <div class="fg" style="margin-bottom:11px">
      <label class="fl">아이디</label>
      <input class="fi" id="lid" value="admin" onkeydown="if(event.key==='Enter')document.getElementById('lpw').focus()">
    </div>
    <div class="fg" style="margin-bottom:18px">

      기본 계정: admin / 1234 &nbsp;·&nbsp; 설정에서 변경 가능
    </div>
  </div>
</div>

<!-- 앱 본체 -->
<div class="app" id="erp" style="display:flex">
<div class="sidebar">
  <div class="slogo">
    <h1>거래관리시스템</h1>
    <span>v4.0 · GitHub Pages</span>
  </div>
  <nav class="snav">
    <div class="nsec">메인</div>

  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="tbtl" id="ptitle">대시보드</div>
    <div class="tba">
      <span id="sync-status" style="font-size:11px;color:var(--mu)"></span>
      <span id="adot" style="display:none;background:var(--err);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;cursor:pointer" onclick="go('alerts')">알림</span>
      <span id="pdisp" style="font-size:11px;color:var(--mu);padding:0 5px"></span>

</div>
</div>

<script>
// ═══ DB ═══
let DB={partners:[],transactions:[],payments:[],items:{},settings:{
  id:'admin',pw:'1234',
  company:'(주)거래관리시스템',biz_no:'000-00-00000',rep:'홍길동',addr:'서울특별시 강남구',
  thr:500000,
  gs_key:'',gs_id:'',gs_range:'거래내역!A1',gs_auto:false,gs_interval:30
}};
let CHARTS=[];let PER={mode:'all',from:'',to:''};
let PAGE='dash';let PF='';let SQ='';let TXI=[];let TXPID='';
let GS_TIMER=null;

function ldDB(){
  try{
    const s=localStorage.getItem('erpv4_gh');
    if(s){
      const parsed=JSON.parse(s);
      DB=parsed;
    }
  }catch(e){console.log('DB load error:',e);}
  if(!DB.items)DB.items={};
  if(!DB.settings)DB.settings={};
  if(!DB.settings.id)DB.settings.id='admin';
  if(!DB.settings.pw)DB.settings.pw='1234';
  if(!DB.settings.company)DB.settings.company='(주)거래관리시스템';
  if(!DB.settings.biz_no)DB.settings.biz_no='000-00-00000';
  if(!DB.settings.rep)DB.settings.rep='홍길동';
  if(!DB.settings.addr)DB.settings.addr='서울특별시 강남구';
  if(!DB.settings.thr)DB.settings.thr=500000;
  if(!DB.settings.gs_key)DB.settings.gs_key='';
  if(!DB.settings.gs_id)DB.settings.gs_id='';
  if(!DB.settings.gs_range)DB.settings.gs_range='거래내역!A1';
  if(!DB.settings.gs_auto)DB.settings.gs_auto=false;
  if(!DB.settings.gs_interval)DB.settings.gs_interval=30;
}
function svDB(){
  try{localStorage.setItem('erpv4_gh',JSON.stringify(DB));return true;}catch(e){console.log('DB save error:',e);return false;}
}

function seed(){
  if(DB.partners.length>0)return;
  DB.partners=[
    {id:'p1',name:'(주)한국물산',contact:'김대표',phone:'02-1234-5678',email:'korea@mail.com',biz_no:'123-45-67890',addr:'서울 강남구',initial_receivable:500000},
    {id:'p2',name:'대한유통',contact:'이사장',phone:'031-222-3333',email:'daihan@mail.com',biz_no:'234-56-78901',addr:'경기 성남시',initial_receivable:0},
    {id:'p3',name:'서울무역(주)',contact:'박부장',phone:'02-9876-5432',email:'seoul@mail.com',biz_no:'345-67-89012',addr:'서울 마포구',initial_receivable:1200000},
  ];
  DB.items={p1:['사과','배','감귤','포도'],p2:['노트북','마우스','키보드'],p3:['철강판','파이프','앵글']};
  const D=(y,m,d)=>`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  DB.transactions=[
    {id:'t1',date:D(2025,1,10),partner_id:'p1',items:[{name:'사과',qty:100,price:1500,tax_type:'exclusive',supply:150000,tax:15000,total:165000},{name:'배',qty:50,price:2000,tax_type:'exclusive',supply:100000,tax:10000,total:110000}],supply_total:250000,tax_total:25000,grand_total:275000,memo:''},
    {id:'t2',date:D(2025,1,15),partner_id:'p2',items:[{name:'노트북',qty:2,price:1100000,tax_type:'inclusive',supply:2000000,tax:200000,total:2200000}],supply_total:2000000,tax_total:200000,grand_total:2200000,memo:'긴급납품'},
    {id:'t3',date:D(2025,3,8),partner_id:'p2',items:[{name:'마우스',qty:20,price:35000,tax_type:'exclusive',supply:700000,tax:70000,total:770000}],supply_total:700000,tax_total:70000,grand_total:770000,memo:''},
    {id:'t4',date:D(2025,4,18),partner_id:'p1',items:[{name:'사과',qty:150,price:1600,tax_type:'exclusive',supply:240000,tax:24000,total:264000},{name:'감귤',qty:100,price:900,tax_type:'exclusive',supply:90000,tax:9000,total:99000}],supply_total:330000,tax_total:33000,grand_total:363000,memo:'4월정기'},
  ];
  DB.payments=[

const gPN=id=>{const p=gP(id);return p?p.name:'-'};
const TAX={exclusive:'별도',inclusive:'포함',free:'면세'};
const TAXF={exclusive:'부가세 별도',inclusive:'부가세 포함',free:'면세'};
const PM={transfer:'계좌이체',cash:'현금',card:'카드',refund:'환불',return:'반환'};
const PBG={transfer:'bbl',cash:'bgn',card:'bog',refund:'brd',return:'bgy'};
const PC=['#1a56db','#0d9f6e','#c27803','#e02424','#6b21a8','#0891b2','#be185d','#065f46'];

function getBal(pid){
  const p=gP(pid);const ini=p?p.initial_receivable||0:0;
  const s=DB.transactions.filter(t=>t.partner_id===pid).reduce((a,t)=>a+(t.grand_total||0),0);
  const pd=DB.payments.filter(py=>py.partner_id===pid).reduce((a,py)=>a+(py.amount||0),0);
  return ini+s-pd;
}
function calcI(qty,price,tt){
  qty=parseFloat(qty)||0;price=parseFloat(price)||0;
  if(tt==='inclusive'){const tot=qty*price;const tax=Math.round(tot/11);return{supply:tot-tax,tax,total:tot};}
  if(tt==='exclusive'){const sup=qty*price;const tax=Math.round(sup*.1);return{supply:sup,tax,total:sup+tax};}
  return{supply:qty*price,tax:0,total:qty*price};
}
function flP(list){
  if(!PER.from&&!PER.to)return list;
  return list.filter(x=>{if(PER.from&&x.date<PER.from)return false;if(PER.to&&x.date>PER.to)return false;return true;});
}

function updSS(dot,msg){
  const el=document.getElementById('sync-status');if(!el)return;
  const colors={'🟢':'#0d9f6e','🟡':'#c27803','🔴':'#e02424','⚪':'#94a3b8'};

async function gsSyncNow(){
  updSS('🟡','구글시트 동기화 중...');
  try{
    const payload={
      '거래처':[
        ['거래처명','사업자번호','담당자','연락처','이메일','기초미수금','현재미수금'],
        ...DB.partners.map(p=>[p.name,p.biz_no||'',p.contact||'',p.phone||'',p.email||'',p.initial_receivable||0,getBal(p.id)])
      ],
      '거래내역':[['날짜','거래처','품목','부가세','수량','단가','공급가액','세액','합계','비고']],
      '지급내역':[
        ['날짜','거래처','지급방법','금액','비고'],
        ...DB.payments.map(py=>[py.date,gPN(py.partner_id),PM[py.method]||py.method,py.amount,py.memo||''])
      ],
      '미수금현황':[
        ['거래처','기초미수금','총매입','총지급','현재미수금'],
        ...DB.partners.map(p=>{
          const s=DB.transactions.filter(t=>t.partner_id===p.id).reduce((a,t)=>a+t.grand_total,0);
          const pd=DB.payments.filter(py=>py.partner_id===p.id).reduce((a,py)=>a+py.amount,0);
          return[p.name,p.initial_receivable||0,s,pd,getBal(p.id)];
        })
      ]
    };
    DB.transactions.forEach(t=>t.items.forEach((item,i)=>{
      payload['거래내역'].push([t.date,gPN(t.partner_id),item.name,item.spec||'',TAXF[item.tax_type],item.qty,item.price,item.supply,item.tax,item.total,i===0?t.memo||'':'']);
    }));

    const res=await fetch(GS_SCRIPT_URL,{
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify(payload)
    });
    const d=await res.json();
    const now=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    if(d.status==='success'){
      updSS('🟢',`동기화 완료 ${now}`);
    } else {
      updSS('🔴','오류: '+(d.msg||'알 수 없음'));
    }
  }catch(err){
    updSS('🔴','연결 실패: '+err.message);
  }
}

function tic(i,f,v){
  TXI[i][f]=v;
  if(f==='qty'||f==='price'||f==='tax_type'){
    const c=calcI(TXI[i].qty,TXI[i].price,TXI[i].tax_type);
    TXI[i].supply=c.supply;TXI[i].tax=c.tax;TXI[i].total=c.total;
    // 규격 추가로 셀 인덱스: 품목(0) 부가세(1) 규격(2) 수량(3) 단가(4) 공급가(5) 세액(6) 합계(7) 삭제(8)
    const row=document.querySelectorAll('#itw tbody tr')[i];
    if(row){
      const cells=row.querySelectorAll('td');
      if(cells[5])cells[5].textContent=TXI[i].supply.toLocaleString('ko-KR');
      if(cells[6])cells[6].textContent=TXI[i].tax.toLocaleString('ko-KR');
      if(cells[7])cells[7].textContent=TXI[i].total.toLocaleString('ko-KR');
    }
    // tfoot 합계 업데이트 (colspan=5 이므로 fcells[1,2,3])
    const tfoot=document.querySelector('#itw tfoot');
    if(tfoot){
      const st2=TXI.reduce((s,it)=>s+it.supply,0);
      const tt2=TXI.reduce((s,it)=>s+it.tax,0);
      const gt2=TXI.reduce((s,it)=>s+it.total,0);
      const fcells=tfoot.querySelectorAll('td');
      if(fcells[1])fcells[1].textContent=st2.toLocaleString('ko-KR');
      if(fcells[2])fcells[2].textContent=tt2.toLocaleString('ko-KR');
      if(fcells[3])fcells[3].textContent=gt2.toLocaleString('ko-KR');
    }
  }
}

function svTx(id){
  const date=document.getElementById('txd').value;const partner_id=document.getElementById('txp').value;const memo=document.getElementById('txm').value;

  if(!DB.items[partner_id])DB.items[partner_id]=[];
  TXI.forEach(item=>{if(item.name&&!DB.items[partner_id].includes(item.name))DB.items[partner_id].push(item.name);});
  const supply_total=TXI.reduce((s,i)=>s+i.supply,0);const tax_total=TXI.reduce((s,i)=>s+i.tax,0);const grand_total=TXI.reduce((s,i)=>s+i.total,0);
  if(id)Object.assign(DB.transactions.find(x=>x.id===id),{date,partner_id,items:JSON.parse(JSON.stringify(TXI)),supply_total,tax_total,grand_total,memo});
  else DB.transactions.push({id:gid(),date,partner_id,items:JSON.parse(JSON.stringify(TXI)),supply_total,tax_total,grand_total,memo});
  svDB();closeM();rc();
}

function bStmt(ym,pid){
  const from=ym+'-01';const de=new Date(ym+'-01');de.setMonth(de.getMonth()+1);de.setDate(de.getDate()-1);const to=de.toISOString().slice(0,10);
  let txl=DB.transactions.filter(t=>t.date>=from&&t.date<=to);let pyl=DB.payments.filter(p=>p.date>=from&&p.date<=to);
  if(pid){txl=txl.filter(t=>t.partner_id===pid);pyl=pyl.filter(p=>p.partner_id===pid);}
  txl.sort((a,b)=>a.date.localeCompare(b.date));pyl.sort((a,b)=>a.date.localeCompare(b.date));
  const targets=pid?[gP(pid)].filter(Boolean):DB.partners;

  if(!window.XLSX){alert('잠시 후 다시 시도해주세요');return;}
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(DB.partners.map(p=>({거래처명:p.name,사업자번호:p.biz_no||'',담당자:p.contact||'',연락처:p.phone||'',이메일:p.email||'',기초미수금:p.initial_receivable||0,현재미수금:getBal(p.id)}))),'거래처');
  const txRows=[];DB.transactions.forEach(t=>t.items.forEach((item,i)=>txRows.push({날짜:t.date,거래처:gPN(t.partner_id),품목:item.name,규격:item.spec||'',부가세:TAXF[item.tax_type],수량:item.qty,단가:item.price,공급가액:item.supply,세액:item.tax,합계:item.total,비고:i===0?t.memo||'':''})));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(txRows),'거래내역');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(DB.payments.map(py=>({날짜:py.date,거래처:gPN(py.partner_id),지급방법:PM[py.method]||py.method,금액:py.amount,비고:py.memo||''}))),'지급내역');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(DB.partners.map(p=>{const s=DB.transactions.filter(t=>t.partner_id===p.id).reduce((a,t)=>a+t.grand_total,0);const pd=DB.payments.filter(py=>py.partner_id===p.id).reduce((a,py)=>a+py.amount,0);return{거래처:p.name,기초미수금:p.initial_receivable||0,총매입:s,총지급:pd,현재미수금:getBal(p.id)};})),'미수금현황');
  XLSX.writeFile(wb,'거래관리_'+new Date().toISOString().slice(0,10).replace(/-/g,'')+'.xlsx');
}
function trigImp(){document.getElementById('impf').click();}
function handleImp(ev){
  const file=ev.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{const wb=XLSX.read(e.target.result,{type:'array'});
      if(wb.SheetNames.includes('거래처')){const rows=XLSX.utils.sheet_to_json(wb.Sheets['거래처']);if(rows.length&&confirm(`거래처 ${rows.length}개를 추가할까요?`)){rows.forEach(r=>{if(r['거래처명']&&!DB.partners.find(p=>p.name===r['거래처명']))DB.partners.push({id:gid(),name:r['거래처명'],biz_no:r['사업자번호']||'',contact:r['담당자']||'',phone:r['연락처']||'',email:r['이메일']||'',initial_receivable:r['기초미수금']||0});});}}
      svDB();rc();chkAlerts();alert('불러오기 완료');
    }catch(err){alert('파일 오류: '+err.message);}
    ev.target.value='';
  };
  reader.readAsArrayBuffer(file);
}

function openM(sz,title,body,footer){document.getElementById('mc').innerHTML=`<div class="moverlay" onclick="if(event.target===this)closeM()"><div class="modal ${sz}"><div class="mh"><span class="mt2">${title}</span><button class="xbtn" onclick="closeM()">×</button></div><div class="mb2">${body}</div>${footer?`<div class="mf">${footer}</div>`:''}</div></div>`;}
function closeM(){document.getElementById('mc').innerHTML='';}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeM();});

ldDB();seed();go("dash");chkAlerts();
